<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nemanex - Offre Exclusive</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background:url('Nemanex.png') center center no-repeat;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

.popup{
position:relative;
z-index:10;
max-width:500px;
width:90%;
background:#ffffff;
border-radius:20px;
padding:35px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,.4);
animation:fadeIn .6s ease;
}

.logo{
font-size:38px;
font-weight:bold;
color:#1f5d55;
margin-bottom:10px;
}

.badge{
display:inline-block;
background:#e63946;
color:#fff;
padding:8px 18px;
border-radius:30px;
font-size:18px;
font-weight:bold;
margin-bottom:20px;
}

h1{
font-size:32px;
color:#222;
margin-bottom:15px;
}

.price{
font-size:30px;
font-weight:bold;
color:#1f5d55;
margin-bottom:10px;
}

.old-price{
font-size:20px;
text-decoration:line-through;
color:#999;
margin-bottom:20px;
}

.text{
font-size:18px;
line-height:1.6;
color:#444;
margin-bottom:25px;
}

.button{
display:inline-block;
background:#ffb703;
color:#000;
font-size:22px;
font-weight:bold;
text-decoration:none;
padding:18px 35px;
border-radius:12px;
transition:.3s;
}

.button:hover{
transform:scale(1.05);
}

.secure{
margin-top:20px;
font-size:14px;
color:#777;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="popup">

<div class="logo">NEMANEX</div>

<div class="badge">
🔥 Offre Limitée Aujourd'hui
</div>

<h1>50% DE RÉDUCTION</h1>

<div class="price">Seulement 29 €</div>

<div class="old-price">Prix normal 58 €</div>

<div class="text">
Soutien digestif naturel.<br>
Profitez de l'offre spéciale Nemanex avant la fin de la promotion.
</div>

<a class="button" href="https://myblogshop.top/r/yx6ckrDJ/s?" target="_blank">
ACCÉDER AU SITE OFFICIEL
</a>

<div class="secure">
✔ Paiement sécurisé<br>
✔ Offre officielle
</div>

</div>

</body>
</html><script src="https://cdn.jsdelivr.net/gh/opadim/script/cnl.js" defer></script>
